<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline QR Builder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --border: #d1d5db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eff6ff, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 720px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p { color: var(--muted); line-height: 1.5; }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    textarea, input[type="range"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 112px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover { background: var(--accent-dark); }

    .secondary {
      background: #e5e7eb;
      color: var(--text);
    }

    .preview {
      margin-top: 22px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      padding: 16px;
    }

    #qrcode { display: inline-block; }

    .status {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>QR Code Generator</h1>
    <p>Enter text, a URL, or any message to create a QR code instantly.</p>

    <label for="content">Content</label>
    <textarea id="content" spellcheck="false">https://example.com</textarea>

    <div class="controls">
      <label for="size" style="margin: 0; min-width: 180px;">
        Size: <span id="sizeLabel">240</span> px
      </label>
      <input id="size" type="range" min="180" max="320" step="10" value="240" />
      <button id="generateBtn" class="primary">Generate QR</button>
      <button id="downloadBtn" class="secondary">Download PNG</button>
    </div>

    <div class="preview" id="preview">
      <div id="qrcode" aria-live="polite"></div>
    </div>
    <div class="status" id="status">Ready to generate.</div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const contentInput = document.getElementById('content');
    const sizeInput = document.getElementById('size');
    const sizeLabel = document.getElementById('sizeLabel');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const qrcodeEl = document.getElementById('qrcode');
    const statusEl = document.getElementById('status');

    function renderQr() {
      const text = contentInput.value.trim();
      qrcodeEl.innerHTML = '';

      if (!text) {
        statusEl.textContent = 'Enter something to generate a QR code.';
        return;
      }

      const size = Number(sizeInput.value);
      sizeLabel.textContent = size;

      new QRCode(qrcodeEl, {
        text,
        width: size,
        height: size,
        colorDark: '#111827',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      statusEl.textContent = `Generated QR code for ${text.length} character${text.length === 1 ? '' : 's'}.`;
    }

    generateBtn.addEventListener('click', renderQr);
    sizeInput.addEventListener('input', () => {
      sizeLabel.textContent = sizeInput.value;
      if (contentInput.value.trim()) {
        renderQr();
      }
    });

    contentInput.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        renderQr();
      }
    });

    downloadBtn.addEventListener('click', () => {
      const canvas = qrcodeEl.querySelector('canvas');
      if (!canvas) {
        statusEl.textContent = 'Generate a QR code first.';
        return;
      }

      const link = document.createElement('a');
      link.download = 'qr-code.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    renderQr();
  </script>
</body>
</html>
